<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>売上・利益トラッカー</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">

<style>
body { font-family: sans-serif; padding:20px; background:#f8fafc; }
.card { background:white; padding:15px; border-radius:10px; margin-bottom:10px; }
input, select { width:100%; padding:10px; margin:5px 0; }
button { padding:10px; width:100%; }
</style>
</head>

<body>

<h2>💰 売上・利益トラッカー</h2>

<div class="card">
<input id="name" placeholder="商品名">
<input id="cost" type="number" placeholder="原価">
<input id="sale" type="number" placeholder="売価">
<button onclick="add()">商品追加</button>
</div>

<div class="card">
<select id="select" onchange="reset()"></select>
<button onclick="count--">−</button>
<span id="num">0</span>
<button onclick="count++">＋</button>
</div>

<div class="card">
売上：<span id="sales">0</span><br>
利益：<span id="profit">0</span>
</div>

<script>
let items = JSON.parse(localStorage.getItem("items")) || [];
let count = 0;

function save(){
  localStorage.setItem("items", JSON.stringify(items));
}

function add(){
  const n = name.value;
  const c = +cost.value;
  const s = +sale.value;
  if(!n || !c || !s) return alert("入力して");
  items.push({n,c,s});
  save();
  updateSelect();
}

function updateSelect(){
  select.innerHTML = "";
  items.forEach((i,idx)=>{
    select.innerHTML += `<option value="${idx}">${i.n}</option>`;
  });
}
updateSelect();

function reset(){
  count=0;
}

setInterval(()=>{
  num.textContent = count;
  const i = items[select.value];
  if(!i) return;
  sales.textContent = i.s * count;
  profit.textContent = (i.s - i.c) * count;
},100);

// PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
